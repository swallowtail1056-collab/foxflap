<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxy Flap 🦊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #scoreBoard {
    display: flex;
    gap: 32px;
    color: #ffd97d;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #scoreBoard span { color: #fff; font-size: 20px; }
  #canvas {
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(255, 120, 50, 0.3), 0 0 0 2px rgba(255,180,80,0.2);
    cursor: pointer;
    display: block;
  }
  #hint {
    color: rgba(255,215,120,0.7);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  #langBar {
    display: flex;
    gap: 8px;
    position: absolute;
    top: -44px;
    right: 0;
  }
  .langBtn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,215,120,0.4);
    color: rgba(255,215,120,0.7);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .langBtn.active {
    background: rgba(255,215,120,0.3);
    color: #ffd97d;
    border-color: #ffd97d;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div style="position:relative;width:360px;">
    <div id="langBar">
      <button class="langBtn active" id="btnJa" onclick="setLang('ja')">🇯🇵 JA</button>
      <button class="langBtn" id="btnEn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
    <div id="scoreBoard">
      <span id="labelScore">スコア</span> <span id="score">0</span>
      &nbsp;&nbsp;<span id="labelBest">最高</span> <span id="best">0</span>
    </div>
  </div>
  <canvas id="canvas" width="360" height="560"></canvas>
  <div id="hint">クリック / スペース / タップ でジャンプ</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Palette ──────────────────────────────────────
const SKY_TOP    = '#87ceeb';
const SKY_BOT    = '#c8e8f0';
const GROUND_COL = '#6b3d1e';
const GRASS_COL  = '#3a7d2c';

// ── Language ─────────────────────────────────────
let LANG = 'ja';
const T = {
  ja: {
    score: 'スコア', best: '最高',
    hint: 'クリック / スペース / タップ でジャンプ',
    title: 'Foxy Flap 🦊',
    start: 'タップしてスタート！',
    startSub: 'Click / Space / Tap',
    dead: '💥 やられた！',
    newRecord: '🎉 新記録！',
    retry: 'タップして もう一度',
  },
  en: {
    score: 'Score', best: 'Best',
    hint: 'Click / Space / Tap to jump',
    title: 'Foxy Flap 🦊',
    start: 'Tap to Start!',
    startSub: 'Click / Space / Tap',
    dead: '💥 Game Over!',
    newRecord: '🎉 New Record!',
    retry: 'Tap to Play Again',
  }
};
function setLang(lang) {
  LANG = lang;
  document.getElementById('btnJa').classList.toggle('active', lang === 'ja');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('labelScore').textContent = T[lang].score;
  document.getElementById('labelBest').textContent = T[lang].best;
  document.getElementById('hint').textContent = T[lang].hint;
}
function t(key) { return T[LANG][key]; }

// ── State ─────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;

// Fox
let fox = { x: 80, y: H/2, vy: 0, r: 18 };
const GRAVITY  = 0.38;
const JUMP_V   = -7;

// Pipes
let pipes = [];
const PIPE_W    = 48;
const PIPE_GAP  = 230;
const PIPE_SPD  = 1.6;
let pipeTimer   = 0;
const PIPE_INT  = 135;  // frames between pipes

// Ground
const GROUND_H  = 60;
const GY        = H - GROUND_H;

// ── Input ─────────────────────────────────────────
function jump() {
  if (state === 'idle') { state = 'playing'; startBGM(); }
  if (state === 'playing') { fox.vy = JUMP_V; playFlap(); }
  if (state === 'dead') { restart(); }
}
canvas.addEventListener('click', jump);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

// ── Audio ─────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playFlap() {
  try {
    const ac = getAudio();
    const o = ac.createOscillator(); const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(600, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.06);
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    o.start(); o.stop(ac.currentTime + 0.12);
  } catch(e) {}
}
function playScore() {
  try {
    const ac = getAudio();
    [523, 659, 784].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = f; o.type = 'triangle';
      const t = ac.currentTime + i * 0.09;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    });
  } catch(e) {}
}
function playDie() {
  try {
    const ac = getAudio();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(300, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
    g.gain.setValueAtTime(0.25, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
    o.start(); o.stop(ac.currentTime + 0.35);
  } catch(e) {}
}

// ── BGM (森のほのぼのメロディ) ────────────────────
let bgmNodes = [];
let bgmPlaying = false;

// ト長調の森っぽいメロディ音符 (周波数, 長さ秒)
const MELODY = [
  [392,0.4],[440,0.4],[494,0.4],[523,0.8],
  [494,0.4],[440,0.4],[392,0.8],
  [349,0.4],[392,0.4],[440,0.4],[494,0.8],
  [440,0.4],[392,0.4],[349,0.8],
  [392,0.4],[494,0.4],[523,0.4],[587,0.8],
  [523,0.4],[494,0.4],[440,0.8],
  [392,0.4],[440,0.4],[494,0.4],[523,0.4],[494,0.4],[440,0.4],
  [392,1.2]
];
// 伴奏コード (G-Em-C-D)
const CHORDS = [
  [196,247,294],[164,196,247],[130,164,196],[146,184,220]
];

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  try {
    const ac = getAudio();
    scheduleBGM(ac);
  } catch(e) {}
}

function scheduleBGM(ac) {
  if (!bgmPlaying) return;
  let t = ac.currentTime + 0.05;
  const master = ac.createGain();
  master.gain.value = 0.18;
  master.connect(ac.destination);

  // メロディ（シネウェーブ）
  MELODY.forEach(([freq, dur]) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = freq * 2; // 1オクターブ上
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.6, t + 0.04);
    g.gain.setValueAtTime(0.6, t + dur - 0.08);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
    bgmNodes.push(o);
    t += dur;
  });

  // 伴奏（やわらかいトライアングル）
  const chordDur = 1.6;
  let ct = ac.currentTime + 0.05;
  const totalBars = 8;
  for (let bar = 0; bar < totalBars; bar++) {
    const chord = CHORDS[bar % CHORDS.length];
    chord.forEach(freq => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, ct);
      g.gain.linearRampToValueAtTime(0.25, ct + 0.1);
      g.gain.setValueAtTime(0.2, ct + chordDur - 0.2);
      g.gain.linearRampToValueAtTime(0, ct + chordDur);
      o.connect(g); g.connect(master);
      o.start(ct); o.stop(ct + chordDur + 0.05);
      bgmNodes.push(o);
    });
    ct += chordDur;
  }

  // 鳥のさえずり（ランダム）
  for (let i = 0; i < 4; i++) {
    const bt = ac.currentTime + 1 + Math.random() * 6;
    [0, 0.12, 0.24].forEach(d => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1200 + Math.random() * 400, bt + d);
      o.frequency.exponentialRampToValueAtTime(1600 + Math.random() * 300, bt + d + 0.1);
      g.gain.setValueAtTime(0.12, bt + d);
      g.gain.exponentialRampToValueAtTime(0.001, bt + d + 0.12);
      o.connect(g); g.connect(master);
      o.start(bt + d); o.stop(bt + d + 0.15);
      bgmNodes.push(o);
    });
  }

  // ループ（1曲分の長さ後に再スケジュール）
  const loopDur = MELODY.reduce((s, [,d]) => s + d, 0);
  setTimeout(() => scheduleBGM(ac), (loopDur - 0.2) * 1000);
}

function stopBGM() {
  bgmPlaying = false;
  bgmNodes.forEach(o => { try { o.stop(); } catch(e) {} });
  bgmNodes = [];
}

const jennyImg = new Image();
jennyImg.src = 'jenny.png';

function drawFox(x, y, vy) {
  ctx.save();
  const tilt = Math.max(-25, Math.min(25, vy * 3));
  ctx.translate(x, y);
  ctx.rotate(tilt * Math.PI / 180);
  const w = 60, h = 80;
  ctx.drawImage(jennyImg, -w/2, -h/2, w, h);
  ctx.restore();
}

// ── Obstacle drawing (trees + brick walls) ────────
// Each pipe alternates: even index = tree, odd index = brick wall
function drawPipe(px, topH, idx, gap) {
  gap = gap || PIPE_GAP;
  const botY = topH + gap;
  const type = idx % 2 === 0 ? 'tree' : 'brick';

  if (type === 'tree') {
    drawTree(px, topH, true);   // hanging from top
    drawTree(px, botY, false);  // rising from bottom
  } else {
    drawBrick(px, topH, true);
    drawBrick(px, botY, false);
  }
}

function drawTree(px, endY, fromTop) {
  const tw = PIPE_W;
  // Trunk
  const tg = ctx.createLinearGradient(px, 0, px + tw, 0);
  tg.addColorStop(0, '#8B5E3C'); tg.addColorStop(0.4, '#a0724a'); tg.addColorStop(1, '#6b3d1e');
  ctx.fillStyle = tg;
  if (fromTop) {
    ctx.fillRect(px + 10, 0, tw - 20, endY - 30);
  } else {
    ctx.fillRect(px + 10, endY + 30, tw - 20, GY - endY - 30);
  }

  // Foliage layers (3 stacked triangles)
  const leafColors = ['#2d6e1a', '#3a8c22', '#4aaa2e'];
  const cx = px + tw / 2;
  if (fromTop) {
    // Foliage at bottom of top obstacle
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = leafColors[i];
      ctx.beginPath();
      const fy = endY - 30 - i * 22;
      ctx.moveTo(cx, fy - 36);
      ctx.lineTo(cx - tw/2 - 8 + i*4, fy + 4);
      ctx.lineTo(cx + tw/2 + 8 - i*4, fy + 4);
      ctx.closePath();
      ctx.fill();
    }
  } else {
    // Foliage at top of bottom obstacle
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = leafColors[i];
      ctx.beginPath();
      const fy = endY + 30 + i * 22;
      ctx.moveTo(cx, fy + 36);
      ctx.lineTo(cx - tw/2 - 8 + i*4, fy - 4);
      ctx.lineTo(cx + tw/2 + 8 - i*4, fy - 4);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawBrick(px, endY, fromTop) {
  const tw = PIPE_W;
  const brickH = 14, brickW = 22;
  const drawBricks = (y1, y2) => {
    // Wall fill
    ctx.fillStyle = '#b5451b';
    ctx.fillRect(px, y1, tw, y2 - y1);
    // Brick pattern
    for (let row = y1; row < y2; row += brickH) {
      const offset = Math.floor((row - y1) / brickH) % 2 === 0 ? 0 : brickW / 2;
      ctx.strokeStyle = '#7a2e0e';
      ctx.lineWidth = 1.5;
      for (let col = px - offset; col < px + tw; col += brickW) {
        ctx.strokeRect(col, row, brickW, brickH);
      }
      // Horizontal line
      ctx.beginPath(); ctx.moveTo(px, row); ctx.lineTo(px + tw, row);
      ctx.stroke();
    }
  };
  // Mossy cap
  const capH = 10;
  if (fromTop) {
    drawBricks(0, endY - capH);
    ctx.fillStyle = '#4aaa2e';
    ctx.fillRect(px - 4, endY - capH, tw + 8, capH + 2);
  } else {
    drawBricks(endY + capH, GY);
    ctx.fillStyle = '#4aaa2e';
    ctx.fillRect(px - 4, endY - 2, tw + 8, capH + 2);
  }
}

// ── Background ────────────────────────────────────
const bgImg = new Image();
bgImg.src = 'bg_forest.png';
let bgOff = 0;
let groundOff = 0;

function drawBg() {
  // Scrolling forest background image (2x width for seamless loop)
  const spd = state === 'playing' ? PIPE_SPD * 0.4 : 0;
  bgOff = (bgOff + spd) % 720;
  // Draw twice side by side for seamless scroll
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    ctx.drawImage(bgImg, -bgOff, 0, 720, GY);
    ctx.drawImage(bgImg, 720 - bgOff, 0, 720, GY);
  } else {
    // Fallback solid color while image loads
    ctx.fillStyle = '#2d6e1a';
    ctx.fillRect(0, 0, W, GY);
  }

  // Ground (earth strip at bottom)
  ctx.fillStyle = '#5a8a1a';
  ctx.fillRect(0, GY, W, GROUND_H);

  // Long grass blades (scrolling)
  groundOff = (groundOff + (state === 'playing' ? PIPE_SPD : 0)) % 18;
  const grassHeights = [32, 22, 40, 26, 36, 20, 30, 38, 28, 34, 22, 42, 24, 36];
  for (let gx = -groundOff - 18; gx < W + 18; gx += 6) {
    const hi = Math.floor((gx + groundOff) / 6 + 100) % grassHeights.length;
    const gh = grassHeights[hi];
    const sway = Math.sin((gx + groundOff) * 0.15 + Date.now() * 0.001) * 5;
    ctx.strokeStyle = (hi % 3 === 0) ? '#3a9e1a' : (hi % 3 === 1) ? '#5abf2e' : '#4aaa22';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(gx + 3, GY + 2);
    ctx.quadraticCurveTo(gx + 3 + sway * 0.6, GY - gh * 0.5, gx + 3 + sway, GY - gh);
    ctx.stroke();
  }
}

// ── Overlay ───────────────────────────────────────
function drawIdle() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 110, H/2 - 70, 220, 130, 16);
  ctx.fill();

  ctx.fillStyle = '#ffd97d';
  ctx.font = 'bold 32px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Foxy Flap 🦊', W/2, H/2 - 22);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillText(t('start'), W/2, H/2 + 16);
  ctx.fillText(t('startSub'), W/2, H/2 + 38);
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 120, H/2 - 90, 240, 165, 16);
  ctx.fill();

  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 30px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t('dead'), W/2, H/2 - 45);

  ctx.fillStyle = '#ffd97d';
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.fillText(`${t('score')}: ${score}`, W/2, H/2 - 8);

  if (score >= best) {
    ctx.fillStyle = '#a8e063';
    ctx.font = 'bold 15px "Segoe UI", sans-serif';
    ctx.fillText(t('newRecord'), W/2, H/2 + 18);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.fillText(`${t('best')}: ${best}`, W/2, H/2 + 18);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillText(t('retry'), W/2, H/2 + 50);
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.fillText(score, W/2, 54);
  ctx.shadowBlur = 0;
}

// ── Collision ─────────────────────────────────────
function collides() {
  const fx = fox.x, fy = fox.y, fr = fox.r - 4;
  if (fy + fr >= GY || fy - fr <= 0) return true;
  for (const p of pipes) {
    if (fx + fr > p.x && fx - fr < p.x + PIPE_W) {
      if (fy - fr < p.top || fy + fr > p.top + (p.gap || PIPE_GAP)) return true;
    }
  }
  return false;
}

// ── Restart ───────────────────────────────────────
function restart() {
  fox = { x: 80, y: H/2, vy: 0, r: 18 };
  pipes = [];
  pipeTimer = 0;
  score = 0;
  document.getElementById('score').textContent = 0;
  state = 'playing';
  startBGM();
}

// ── Main loop ─────────────────────────────────────
function loop() {
  drawBg();

  if (state === 'playing') {
    // Physics
    fox.vy += GRAVITY;
    fox.y  += fox.vy;

    // Pipes (難易度：最初5本はゆっくり、その後徐々に加速)
    const pipeCount = pipes.length + pipes.filter(p => p.scored).length;
    const dynInterval = score < 3 ? 200 : score < 5 ? 170 : score < 8 ? 150 : PIPE_INT;
    const dynGap = score < 3 ? 270 : score < 5 ? 255 : score < 8 ? 240 : PIPE_GAP;
    const dynSpd = score < 3 ? 1.2 : score < 5 ? 1.4 : score < 8 ? 1.5 : PIPE_SPD;
    pipeTimer++;
    if (pipeTimer >= dynInterval) {
      pipeTimer = 0;
      const top = 80 + Math.random() * (GY - dynGap - 120);
      pipes.push({ x: W + 10, top, scored: false, idx: pipes.length, gap: dynGap });
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -20);
    for (const p of pipes) {
      p.x -= dynSpd;
      if (!p.scored && p.x + PIPE_W < fox.x) {
        p.scored = true;
        score++;
        document.getElementById('score').textContent = score;
        playScore();
      }
    }

    if (collides()) {
      state = 'dead';
      stopBGM();
      if (score > best) {
        best = score;
        document.getElementById('best').textContent = best;
      }
      playDie();
    }
  }

  // Draw pipes
  for (const p of pipes) drawPipe(p.x, p.top, p.idx, p.gap || PIPE_GAP);

  // Draw fox
  drawFox(fox.x, fox.y, fox.vy);

  // Overlays
  if (state === 'idle') drawIdle();
  if (state === 'dead') drawDead();
  if (state === 'playing') drawScore();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
