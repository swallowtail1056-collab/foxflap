<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxy Flap 🦊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #scoreBoard {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 360px;
    color: #ffd97d;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #scoreLeft {
    display: flex;
    gap: 24px;
  }
  #scoreBoard span { color: #fff; font-size: 20px; }
  #canvas {
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(255, 120, 50, 0.3), 0 0 0 2px rgba(255,180,80,0.2);
    cursor: pointer;
    display: block;
  }
  #hint {
    color: rgba(255,215,120,0.7);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="scoreBoard">
    <div id="scoreLeft">
      <span><span id="labelScore">Score</span> <span id="score">0</span></span>
      <span><span id="labelBest">Best</span> <span id="best">0</span></span>
    </div>
  </div>
  <canvas id="canvas" width="360" height="560"></canvas>
  <div id="hint">Click / Space / Tap to jump</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Palette ──────────────────────────────────────
const SKY_TOP    = '#87ceeb';
const SKY_BOT    = '#c8e8f0';
const GROUND_COL = '#6b3d1e';
const GRASS_COL  = '#3a7d2c';

// ── Language (English only) ───────────────────────
let LANG = 'en';
const T = {
  en: {
    score: 'Score', best: 'Best',
    hint: 'Click / Space / Tap to jump',
    title: 'Foxy Flap 🦊',
    start: 'Tap to Start!',
    startSub: 'Click / Space / Tap',
    dead: '💥 Game Over!',
    newRecord: '🎉 New Record!',
    retry: 'Tap to Play Again',
  }
};
function t(key) { return T[LANG][key]; }

// ── State ─────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;

// Fox
let fox = { x: 80, y: H/2, vy: 0, r: 18 };
const GRAVITY  = 0.38;
const JUMP_V   = -7;

// Pipes
let pipes = [];
const PIPE_W    = 48;
const PIPE_GAP  = 230;
const PIPE_SPD  = 1.6;
let pipeTimer   = 0;
const PIPE_INT  = 135;  // frames between pipes

// Ground
const GROUND_H  = 60;
const GY        = H - GROUND_H;

// ── Input ─────────────────────────────────────────
function jump() {
  if (state === 'idle') { state = 'playing'; startBGM(); }
  if (state === 'playing') { fox.vy = JUMP_V; playFlap(); }
  if (state === 'dead') { restart(); }
}
canvas.addEventListener('click', jump);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

// ── Audio ─────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playFlap() {
  try {
    const ac = getAudio();
    const o = ac.createOscillator(); const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(600, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.06);
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    o.start(); o.stop(ac.currentTime + 0.12);
  } catch(e) {}
}
function playScore() {
  try {
    const ac = getAudio();
    [523, 659, 784].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = f; o.type = 'triangle';
      const t = ac.currentTime + i * 0.09;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    });
  } catch(e) {}
}
function playDie() {
  try {
    const ac = getAudio();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(300, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
    g.gain.setValueAtTime(0.25, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
    o.start(); o.stop(ac.currentTime + 0.35);
  } catch(e) {}
}

// ── BGM (森のほのぼのメロディ) ────────────────────
let bgmNodes = [];
let bgmPlaying = false;

// ト長調の森っぽいメロディ音符 (周波数, 長さ秒)
const MELODY = [
  [392,0.4],[440,0.4],[494,0.4],[523,0.8],
  [494,0.4],[440,0.4],[392,0.8],
  [349,0.4],[392,0.4],[440,0.4],[494,0.8],
  [440,0.4],[392,0.4],[349,0.8],
  [392,0.4],[494,0.4],[523,0.4],[587,0.8],
  [523,0.4],[494,0.4],[440,0.8],
  [392,0.4],[440,0.4],[494,0.4],[523,0.4],[494,0.4],[440,0.4],
  [392,1.2]
];
// 伴奏コード (G-Em-C-D)
const CHORDS = [
  [196,247,294],[164,196,247],[130,164,196],[146,184,220]
];

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  try {
    const ac = getAudio();
    scheduleBGM(ac);
  } catch(e) {}
}

function scheduleBGM(ac) {
  if (!bgmPlaying) return;
  let t = ac.currentTime + 0.05;
  const master = ac.createGain();
  master.gain.value = 0.18;
  master.connect(ac.destination);

  // メロディ（シネウェーブ）
  MELODY.forEach(([freq, dur]) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = freq * 2; // 1オクターブ上
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.6, t + 0.04);
    g.gain.setValueAtTime(0.6, t + dur - 0.08);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
    bgmNodes.push(o);
    t += dur;
  });

  // 伴奏（やわらかいトライアングル）
  const chordDur = 1.6;
  let ct = ac.currentTime + 0.05;
  const totalBars = 8;
  for (let bar = 0; bar < totalBars; bar++) {
    const chord = CHORDS[bar % CHORDS.length];
    chord.forEach(freq => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, ct);
      g.gain.linearRampToValueAtTime(0.25, ct + 0.1);
